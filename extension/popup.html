<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
      color: #8B5CF6;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .success {
      background: #dcfce7;
      color: #166534;
    }
    .error {
      background: #fee2e2;
      color: #991b1b;
    }
    .info {
      background: #f3f4f6;
      color: #374151;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #8B5CF6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover {
      background: #7C3AED;
    }
    button:disabled {
      background: #d1d5db;
      cursor: not-allowed;
    }
    .error-msg {
      display: none;
      margin-top: 8px;
      padding: 8px;
      background: #fee2e2;
      border-radius: 4px;
      color: #991b1b;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>📸 Snappy</h1>
  <div id="status" class="status info">
    Ready to capture this page
  </div>
  <button id="captureBtn">Capture Snapshot</button>
  <div id="error" class="error-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
