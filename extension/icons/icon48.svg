<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient - premium modern feel -->
  <defs>
    <linearGradient id="grad48" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow48" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#grad48)" filter="url(#shadow48)"/>

  <!-- Camera body - prominent, centered -->
  <rect x="10" y="14" width="28" height="18" rx="4" fill="white" opacity="0.98"/>

  <!-- Lens - the eye, draws user in -->
  <circle cx="24" cy="23" r="6" fill="#6366F1"/>
  <circle cx="24" cy="23" r="3" fill="#8B5CF6"/>

  <!-- Flash/snap - dynamic diagonal element -->
  <path d="M32 8L36 14L28 14Z" fill="#22D3EE"/>

  <!-- Shutter button - tactile detail -->
  <rect x="22" y="11" width="4" height="2" rx="1" fill="white" opacity="0.8"/>
</svg>