<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient - premium depth -->
  <defs>
    <linearGradient id="grad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow128" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.2"/>
    </filter>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Main card shape with subtle shadow -->
  <rect width="128" height="128" rx="28" fill="url(#grad128)" filter="url(#shadow128)"/>

  <!-- Camera body - clean, geometric, professional -->
  <rect x="24" y="38" width="80" height="52" rx="12" fill="white" opacity="0.99"/>

  <!-- Lens - centerpiece, draws attention -->
  <circle cx="64" cy="64" r="18" fill="url(#lensGrad)"/>
  <circle cx="64" cy="64" r="12" fill="#5B21B6"/>
  <circle cx="64" cy="64" r="6" fill="#8B5CF6"/>
  <!-- Lens reflection - premium detail -->
  <ellipse cx="60" cy="60" rx="3" ry="2" fill="white" opacity="0.4" transform="rotate(-45 60 60)"/>

  <!-- Flash/snap element - dynamic, action-oriented -->
  <path d="M88 20L96 32L80 32Z" fill="#22D3EE"/>
  <circle cx="88" cy="26" r="2" fill="white" opacity="0.6"/>

  <!-- Shutter button - tactile, prominent -->
  <rect x="60" y="28" width="8" height="6" rx="2" fill="white" opacity="0.9"/>

  <!-- Viewfinder - precision detail -->
  <rect x="34" y="44" width="12" height="8" rx="2" fill="#E5E7EB"/>

  <!-- Recording indicator - subtle tech detail -->
  <circle cx="96" cy="82" r="3" fill="#22D3EE" opacity="0.8"/>

  <!-- Brand reinforcing elements -->
  <rect x="24" y="96" width="80" height="2" rx="1" fill="white" opacity="0.2"/>
</svg>